# Coolify Configuration for SAOIS Website
# This file helps Coolify understand how to deploy the static website

# Build configuration
build:
  dockerfile: Dockerfile
  context: .
  
# Port configuration
ports:
  - 80

# Health check (nginx:alpine includes wget; curl may be missing)
healthcheck:
  test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
  interval: 30s
  timeout: 10s
  retries: 3
